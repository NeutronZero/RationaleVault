name: Verify

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        pip install -e ".[dev]"
    - name: Run pytest
      run: pytest
    - name: Run relay doctor (editable)
      run: python -m relay.cli.main doctor
    - name: Run relay evaluate
      run: python -m relay.cli.main evaluate
    - name: Build package wheel
      run: python -m build
    - name: Install from wheel
      run: |
        pip uninstall -y relay
        pip install dist/*.whl
    - name: Run installed doctor
      run: relay doctor
    - name: Verify release manifest version
      run: |
        python -c "import json; manifest = json.load(open('.relay/reports/release_manifest.json')); assert manifest['relay_version'] == '1.0.0rc2', f'Invalid version: {manifest[\"relay_version\"]}'; assert manifest['schema_version'] == '1.0', f'Invalid schema: {manifest[\"schema_version\"]}'"
