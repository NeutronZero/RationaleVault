name: Verify

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        pip install -e ".[dev]"
    - name: Run pytest
      run: pytest
    - name: Run rationalevault doctor (editable)
      run: python -m rationalevault.cli.main doctor
    - name: Run rationalevault evaluate
      run: python -m rationalevault.cli.main evaluate
    - name: Build package wheel
      run: python -m build
    - name: Install from wheel
      run: |
        pip uninstall -y rationalevault
        pip install dist/*.whl
    - name: Run installed doctor (CWD-agnostic verification)
      run: |
        cd /tmp
        rationalevault doctor
    - name: Run installed evaluate (CWD-agnostic verification)
      run: |
        cd /tmp
        rationalevault evaluate
    - name: Verify release manifest version
      run: |
        python -c "import json, rationalevault; manifest = json.load(open('.rationalevault/reports/release_manifest.json')); assert manifest['rationalevault_version'] == rationalevault.__version__, f'Invalid version: {manifest[\"rationalevault_version\"]}'; assert manifest['schema_version'] == '1.0', f'Invalid schema: {manifest[\"schema_version\"]}'"
